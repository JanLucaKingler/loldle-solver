<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>LOLdle Solver</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>

<h1>LOLdle Solver</h1>
<p class="subtitle">Champion Elimination Tool</p>

<div class="input-section">
    <div id="errorMsg"></div>

    <div class="search-row">
        <div class="search-wrapper">
            <input type="text" id="champName" placeholder="Champion eingeben..." autocomplete="off">
            <div id="suggestions"></div>
        </div>
        <button id="fetchBtn" onclick="fetchChampion()">Laden</button>
    </div>

    <div id="champPanel">
        <h3 id="panelTitle">— Champion —</h3>
        <div class="attr-grid" id="attrGrid"></div>

        <div style="margin-top: 20px; border-top: 1px solid var(--border); padding-top: 16px;">
            <div id="colorPickers"></div>
        </div>

        <button id="addBtn" onclick="addGuess()">Runde hinzufügen</button>
    </div>
</div>

<div class="table-wrapper">
    <table id="guessTable">
        <thead>
        <tr>
            <th>Name</th>
            <th>Gender</th>
            <th>Position</th>
            <th>Species</th>
            <th>Resource</th>
            <th>Range</th>
            <th>Region</th>
            <th>Year</th>
        </tr>
        </thead>
        <tbody>
        <tr><td colspan="8" class="empty-state">Noch keine Guesses — gib einen Champion ein</td></tr>
        </tbody>
    </table>
</div>

<script src="/solver.js"></script>

</body>
</html>
